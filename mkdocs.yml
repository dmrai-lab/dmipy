site_name: dmipy
site_description: Diffusion Microstructure Imaging in Python — forward Monte Carlo + analytical inverse
site_url: https://dmipy.org
repo_url: https://github.com/dmrai-lab
theme:
  name: material
  font: false            # we load DM Mono + Fraunces ourselves (see extra.css)
  palette:
    scheme: slate
    primary: black
    accent: teal
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/dmrai.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - search
nav:
  - Home: index.md
  - Install: install.md
  - Migrating from dmipy 1.x: migrating.md
  - Inverse — dmipy-fit: fit.md
  - Forward — dmipy-sim: sim.md
  - Pedagogy — watch the spins: pedagogy.md
  - Acquisition sequences: sequences.md
  - Substrate & geometry: substrate.md
  - Biophysical constants: constants.md
  - Model catalog: catalog.md
  - Surface relaxivity & MWF: surface_relaxivity_bias.md
  - Coherence-gated physics: coherence_gated_physics.md
  - Examples:
      - Canonical WM parity (fit ↔ sim): examples/canonical_wm_parity.md
  - Derivations:
      - GPA for arbitrary waveforms: derivations/gpa_arbitrary_waveform.md
      - Generalized Kärger exchange: derivations/karger_exchange.md
  - API reference: api.md
