site_name: "dmipy 2.x"
site_description: Diffusion Microstructure Imaging in Python — forward Monte Carlo + analytical inverse
site_url: https://dmipy.org
repo_url: https://github.com/dmrai-lab/dmipy
repo_name: dmrai-lab/dmipy
theme:
  name: material
  font: false            # we load DM Mono + Fraunces ourselves (see extra.css)
  palette:
    scheme: slate
    primary: black
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - toc.integrate
    - content.code.copy
    - search.suggest
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
extra_css:
  - stylesheets/dmrai.css
extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 3
            separate_signature: true
            show_signature_annotations: true
            docstring_section_style: table
            members_order: source
            filters: ["!^_"]
nav:
  - Home: index.md
  - Install: install.md
  - Migrating: migrating.md
  - dmipy-fit:
      - Inverse — overview: fit.md
      - Model catalog: catalog.md
      - Derivations:
          - GPA for arbitrary waveforms: derivations/gpa_arbitrary_waveform.md
          - Generalized Kärger exchange: derivations/karger_exchange.md
  - dmipy-sim:
      - Forward — overview: sim.md
      - Acquisition sequences: sequences.md
      - Substrate & geometry: substrate.md
      - Mesh substrates: mesh_substrates.md
      - Biophysical constants: constants.md
      - Pedagogy — watch the spins: pedagogy.md
  - dmipy-design:
      - Acquisition design — overview: design.md
      - Deliverable waveforms & constraints: design/deliverable.md
      - OGSE spectral design: design/spectral.md
      - Max-b vs min-TE (SNR): design/snr.md
      - Run it on the scanner (Pulseq): design/pulseq.md
  - Physics effects:
      - Overview: physics/index.md
      - Diffusion: physics/diffusion.md
      - Permeability & exchange: physics/permeability.md
      - Surface relaxivity & MWF: surface_relaxivity_bias.md
      - Coherence gating (PGSTE): physics/coherence_gating.md
      - Susceptibility: physics/susceptibility.md
      - Magnetization transfer: physics/magnetization_transfer.md
  - Examples:
      - Canonical WM parity (fit ↔ sim): examples/canonical_wm_parity.md
  - Publications: publications.md
  - API reference: api.md
