name: docs
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      # engines installed for mkdocstrings API autodoc (public repos)
      - run: pip install ".[docs]" || pip install mkdocs-material "mkdocstrings[python]" mkdocs-jupyter
      - run: mkdocs build --strict || mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }
      - uses: actions/deploy-pages@v4
