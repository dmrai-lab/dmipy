name: Publish to PyPI

# Publishes when a GitHub Release is published. Uses PyPI Trusted Publishing
# (OIDC) — no API token is stored. One-time setup on PyPI: add a trusted
# publisher for project "dmipy" with owner=dmrai-lab, repo=dmipy,
# workflow=publish.yml, environment=pypi.
#
# NB: publish the engines (dmipy-sim, dmipy-fit) FIRST — this umbrella depends
# on them by version, so `pip install dmipy` can only resolve once they are on PyPI.
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
